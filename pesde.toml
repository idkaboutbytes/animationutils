name = "idkaboutbytes/animationutils"
version = "1.0.3"
description = "Animationutils package for Roblox."
license = "MIT"
authors = ["idkaboutbytes"]
repository = "https://github.com/idkaboutbytes/animationutils"
includes = [
    "pesde.toml",
    "README.md",
    "CHANGELOG.md",
    "default.project.json",
    "src/**/*.luau",
]

[target]
environment = "roblox"
lib = "src"
build_files = ["src"]

[dependencies]
Loader = { repo = "idkaboutbytes/loader", rev = "v1.2.3" }
Brio = { repo = "idkaboutbytes/brio", rev = "v1.2.2" }
Enumutils = { repo = "idkaboutbytes/enumutils", rev = "v1.0.2" }
Maid = { repo = "idkaboutbytes/maid", rev = "v1.1.2" }
Promise = { repo = "idkaboutbytes/promise", rev = "v2.1.3" }
PromiseMaidUtils = { repo = "idkaboutbytes/promisemaidutils", rev = "v2.1.3" }
Rbxassetutils = { repo = "idkaboutbytes/rbxassetutils", rev = "v1.0.2" }
Rx = { repo = "idkaboutbytes/rx", rev = "v1.0.5" }
